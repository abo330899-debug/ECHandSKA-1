kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "npm install -g pnpm@9.15.9 && pnpm install && pnpm --filter @workspace/nafsam run build && pnpm --filter @workspace/api-server run build && find /home/runner/workspace -maxdepth 4 -name 'node_modules' -type d -prune -exec rm -rf '{}' + 2>/dev/null; true"]
run = ["node", "--enable-source-maps", "/home/runner/workspace/artifacts/api-server/dist/index.mjs"]

[services.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
